<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enlace no válido — Alter5</title>
<link rel="icon" type="image/svg+xml" href="/ds/alter5-mark.svg">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ds/tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--a5-font-landing);
  background:#fafbfc;
  color:var(--a5-text-primary);
  min-height:100vh;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.hdr{
  background:var(--a5-blue);
  padding:14px 32px;
  display:flex;align-items:center;
}
.hdr-logo{display:inline-flex;align-items:center}
.hdr-logo img{height:28px;width:auto;display:block}

.main{
  flex:1;max-width:560px;width:100%;
  margin:0 auto;
  padding:64px 24px 40px;
  text-align:center;
}
.icon{
  width:80px;height:80px;
  background:#FEF2F2;
  border:2px solid #FECACA;
  border-radius:var(--a5-radius-full);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  font-size:32px;
  color:#DC2626;
  font-weight:700;
}
h1{
  font-family:var(--a5-font-landing);
  font-weight:700;
  font-size:36px;
  color:var(--a5-blue);
  margin-bottom:14px;
  letter-spacing:-0.025em;
  text-wrap:balance;
}
p{
  font-size:16px;
  color:var(--a5-slate);
  line-height:1.65;
  margin-bottom:14px;
}

.btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:8px;
  font-family:var(--a5-font-landing);
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  border:0;
  border-radius:var(--a5-radius-full);
  padding:14px 32px;
  background:var(--a5-blue);
  color:white;
  text-decoration:none;
  margin-top:16px;
  transition:background-color var(--a5-ease-fast), transform var(--a5-ease-fast), box-shadow var(--a5-ease-fast);
}
.btn:hover{background:#0e1f47;transform:translateY(-1px);box-shadow:0 6px 16px rgba(19,40,91,0.25)}

.ftr{
  text-align:center;
  padding:24px 16px;
  font-size:12px;
  color:var(--a5-text-muted);
  font-family:'JetBrains Mono',monospace;
  letter-spacing:0.05em;
}

@media (max-width:640px){
  .hdr{padding:12px 20px}
  .main{padding:40px 20px}
  h1{font-size:28px}
}
</style>
</head>
<body>
<header class="hdr">
  <a class="hdr-logo" href="https://www.alter5.com" target="_blank" rel="noopener" aria-label="Alter5">
    <img src="/ds/alter5-logo-white.svg" alt="Alter5">
  </a>
</header>
<main class="main">
  <div class="icon">!</div>
  <h1 id="title">Enlace no válido</h1>
  <p id="reason">Este enlace de verificación no se puede usar.</p>
  <p>Por favor, vuelve a introducir tu email para recibir un enlace nuevo.</p>
  <a href="/hoe" class="btn">Volver a empezar</a>
</main>
<footer class="ftr">Alter5 Financial Technologies, S.L.</footer>
<script>
const reasons = {
  expired:  { title: 'Enlace caducado',  msg: 'El enlace ha expirado (vida máxima 30 minutos).' },
  used:     { title: 'Enlace ya usado',  msg: 'Este enlace se usó anteriormente. Los enlaces son de un solo uso por seguridad.' },
  invalid:  { title: 'Enlace no válido', msg: 'El enlace está corrupto o no es correcto.' },
  deleted:  { title: 'Candidatura no disponible', msg: 'Esta candidatura ya no está activa en el sistema.' },
  server:   { title: 'Error temporal',   msg: 'Se produjo un error al validar el enlace. Inténtalo de nuevo.' },
};
const p = new URLSearchParams(window.location.search);
const r = reasons[p.get('reason')] || reasons.invalid;
document.getElementById('title').textContent = r.title;
document.getElementById('reason').textContent = r.msg;
</script>
</body>
</html>
